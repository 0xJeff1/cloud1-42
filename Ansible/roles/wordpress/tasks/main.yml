---
- name: Ensure bind mount directory exists for WordPress
  file:
    path: /opt/inception/data/wordpress
    state: directory
    mode: "0755"

- name: Start (or update) WordPress and its DB with docker-compose
  shell:
    cmd: |
      if command -v docker-compose >/dev/null 2>&1; then
        docker-compose -f srcs/docker-compose.yml up -d --build wordpress mariadb
      else
        docker compose -f srcs/docker-compose.yml up -d --build wordpress mariadb
      fi
    chdir: /opt/inception
  # Running compose is idempotent for service definitions; this will start or update the containers.

